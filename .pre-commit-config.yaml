repos:
  - repo: https://github.com/hhatto/autopep8
    rev: v2.3.1
    hooks:
      - id: autopep8

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: double-quote-string-fixer
      - id: trailing-whitespace
        exclude: ^src/igvfd/tests/data/inserts/expected_.*\.tsv$
      - id: end-of-file-fixer
        exclude: ^(cdk)/tests/unit/snapshots|^src/igvfd/tests/data/inserts/expected_.*\.tsv$
      - id: pretty-format-json
        args: ['--autofix', '--no-sort-keys', '--indent=4', '--no-ensure-ascii']
        exclude: ^(cdk)/tests/unit/snapshots
      - id: check-yaml

  - repo: local
    hooks:
      - id: check-docker-igvfd
        name: check for stale igvfd Docker containers
        entry: scripts/check-docker-igvfd.sh
        language: script
        pass_filenames: false
        stages: [push]
